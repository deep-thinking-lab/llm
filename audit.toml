# Security audit exceptions for the llm crate.
# Each entry must include an owner, a date of acceptance, and an expiry date.
# Review these before expiry and either remove (if fixed upstream) or extend.

[advisories]
# rustls-webpki 0.101.7 advisories (RUSTSEC-2026-0104, RUSTSEC-2026-0098, RUSTSEC-2026-0099)
# Blocked on AWS SDK (aws-smithy-http-client -> hyper-rustls 0.24 -> rustls 0.21 -> rustls-webpki 0.101)
# The AWS SDK has not released a version that uses rustls >= 0.23 for the smithy HTTP client.
# Monitor: https://github.com/awslabs/aws-sdk-rust
ignore = [
    "RUSTSEC-2026-0104",  # Reachable panic in CRL parsing (rustls-webpki 0.101.7)
    "RUSTSEC-2026-0098",  # Name constraints for URI names (rustls-webpki 0.101.7)
    "RUSTSEC-2026-0099",  # Name constraints for wildcard names (rustls-webpki 0.101.7)
]
# Owner: security@voxeltron.dev
# Accepted: 2026-05-23
# Expires: 2026-08-23 (3 months — re-evaluate when AWS SDK releases a new major version)

[unmaintained]
# Transitive unmaintained dependencies — none are directly used by llm code.
# bincode 1.3.3 via syntect -> llm (syntax highlighting)
# paste 1.0.15 via ratatui -> llm (TUI framework)
# serial 0.4.0 via portable-pty -> llm (PTY handling)
# yaml-rust 0.4.5 via syntect -> llm (syntax highlighting)
# Evaluate replacement options for syntect and ratatui in the next planning cycle.
ignore = [
    "RUSTSEC-2025-0141",  # bincode unmaintained
    "RUSTSEC-2024-0436",  # paste unmaintained
    "RUSTSEC-2017-0008",  # serial unmaintained
    "RUSTSEC-2024-0320",  # yaml-rust unmaintained
    "RUSTSEC-2025-0134",  # rustls-pemfile unmaintained (both 1.0.4 and 2.2.0)
]

[unsound]
# lru 0.12.5 via ratatui — unsound IterMut implementation.
# rand 0.8.5/0.9.2 — unsound with custom logger. llm does not use a custom logger with rand::rng().
ignore = [
    "RUSTSEC-2026-0002",  # lru IterMut unsound
    "RUSTSEC-2026-0097",  # rand unsound with custom logger
]
# Owner: security@voxeltron.dev
# Accepted: 2026-05-23
# Expires: 2026-08-23
